<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Flexbox</title>
</head>
<style>
    .container{
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background-color: red;
        margin: 5px;
        padding: 10px;
        border-radius: 10px;
        height: 100px;
    }

    .box {
        border-radius: 10px;
        background-color: yellow;
        margin: 5px;
        padding: 5px 15px;
        width: fit-content;
        text-align: center;
    }
</style>

<body>
    <!-- <h1>CSS-Flexbox</h1> -->
    <div class="container">
        <div class="box">amit</div>
        <div class="box">sumit</div>
        <div class="box">sanjana</div>
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>

</html>
