<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Team - Float Practice</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
    }

    .team-section {
      width: 90%;
      margin: 30px auto;
      border: 2px solid #444;
      padding: 20px;
    }

    .member {
      float: right;
      width: 30%;
      margin: 1.66%;
      padding: 20px;
      background-color: #f4f4f4;
      border-radius: 8px;
      text-align: center;
    }

    .member img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .clearfix::after {
      content: "";
      display: table;
      clear: both;
    }
  </style>
</head>
<body>

  <div class="team-section clearfix">
    <div class="member">
      <img src="https://via.placeholder.com/80" alt="Member 1">
      <h3>Ravi Kumar</h3>
      <p>Web Developer</p>
    </div>
    <div class="member">
      <img src="https://via.placeholder.com/80" alt="Member 2">
      <h3>Priya Singh</h3>
      <p>UI/UX Designer</p>
    </div>
    <div class="member">
      <img src="https://via.placeholder.com/80" alt="Member 3">
      <h3>Arjun Mehta</h3>
      <p>Backend Engineer</p>
    </div>
  </div>

</body>
</html>
