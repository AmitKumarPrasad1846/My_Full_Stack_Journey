<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS display properties</title>
</head>
<style>
    .box {
        border: 2px solid blue;
        display: inline-block;
        width: 344px;
        padding: 45px;
        margin: 34px;
    }
    .box1{
        background-image: linear-gradient(to bottom, red, blue, green);
        /* Both these properties does the same thing (i.e. hides the box) */

        /* display: none; */
        /* visibility: hidden; */
    }
</style>

<body>

    <!-- refer to this below link for knowing more about CSS display properties. -->

    <!-- https://developer.mozilla.org/en-US/docs/Web/CSS/display -->

    <h1>CSS Display properties:</h1>
    <div class="box box1">
        I am a box.
    </div>
    <div class="box">
        I am a block level element by default.
    </div>

</body>

</html>
