<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Overflow Property</title>
    <style>
        .box{
            width: 30vh;
            height: 40vh;
            border: 2px solid black;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1 class="question">CSS Box Model:</h1>
        <p class="answer">The CSS Box model defines how elements are rendered and how their dimensions are calculated.
            It describes the structure of an element as a rectangular box that has content, padding, a border, and a
            marigin.</p>
    </div>

</body>

</html>
